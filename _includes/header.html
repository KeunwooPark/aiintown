<header class="site-header">
  <div class="container">
    <nav class="header-links" aria-label="Repositories">
      <a href="https://github.com/KeunwooPark/aiintown" target="_blank" rel="noopener">GitHub</a>
      <a href="https://www.flumecode.work/repositories/26c6aa50-ba00-4b22-b371-fb4ccfe0fe0b" target="_blank" rel="noopener">FlumeCode</a>
    </nav>
    <h1>{{ site.title }}</h1>
    <p class="tagline" data-i18n="tagline">Upcoming in-person AI events, city by city.</p>
    <label class="lang-switch">
      <span class="sr-only" data-i18n="language_label">Language</span>
      <select id="lang-switcher">
        {% for pair in site.data.i18n %}<option value="{{ pair[0] }}">{{ pair[1].name }}</option>{% endfor %}
      </select>
    </label>
    {% unless page.layout == 'city' %}{% include search-bar.html %}{% endunless %}
  </div>
</header>
