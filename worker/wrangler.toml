name = "aiintown-ask"
main = "src/index.js"
compatibility_date = "2026-01-01"

# Public site origin allowed to call this Worker (CORS). Override per environment.
[vars]
ALLOWED_ORIGIN = "https://keunwoopark.github.io"
CITIES = "berlin,seoul"
EVENTS_BASE_URL = "https://raw.githubusercontent.com/KeunwooPark/aiintown/main/_data/events"
MODEL = "claude-sonnet-5"
# Route the Messages API call through Cloudflare AI Gateway — a direct
# Worker -> api.anthropic.com call is 403'd ("Request not allowed") by the
# Anthropic Cloudflare edge. Account ID is not a secret.
AI_GATEWAY_ACCOUNT_ID = "d51c23705cfa537f2cb11319bce5c040"
AI_GATEWAY_NAME = "aiintown"

# copyeval logging. Set COPYEVAL_BASE_URL to the copyeval API host (NOT the
# console/dashboard host); the SDK appends /api/records. The ask query and answer
# are logged there when the COPYEVAL_API_KEY secret is also set. Leave the URL
# empty to disable logging entirely.
COPYEVAL_BASE_URL = "https://api.copyeval.com"

# Per-IP rate limit: 20 requests / 60s. Remove this block to disable.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

# ANTHROPIC_API_KEY is a secret — do NOT put it here.
# Set it with:  wrangler secret put ANTHROPIC_API_KEY
#
# COPYEVAL_API_KEY is a secret (cev_…) — do NOT put it here.
# Set it with:  wrangler secret put COPYEVAL_API_KEY
